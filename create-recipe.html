<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Создать рецепт — Purple Flavor</title>

<link rel="icon" href="assets/favicon.png?v=2">

<script src="https://cdn.tailwindcss.com"></script>


<style>


body{

background:#FFEEDA;

color:#3A2E52;

}


.editor-wrapper{

position:relative;

}


.editor{

min-height:600px;

outline:none;

}


.editor img{

width:48%;

margin:1%;

border-radius:20px;

display:inline-block;

cursor:pointer;

}



#placeholder{

position:absolute;

top:24px;

left:24px;

color:#9ca3af;

pointer-events:none;

z-index:1;

}



</style>

</head>




<body>



<div class="max-w-4xl mx-auto px-4 py-8">





<h1 class="text-4xl font-bold mb-8">

🍇 Создание рецепта

</h1>





<input

id="title"

placeholder="Название рецепта"

class="

w-full

px-5

py-4

rounded-2xl

border

mb-4

text-xl

"

>





<select

id="category"

class="

w-full

px-5

py-4

rounded-2xl

border

mb-6

">


</select>








<div class="editor-wrapper">


<div id="placeholder">

Напишите рецепт здесь...

</div>



<div

id="editor"

contenteditable="true"

class="

editor

bg-white

rounded-3xl

p-6

text-lg

leading-relaxed

">


</div>



</div>







<button

onclick="addPhoto()"

class="
mt-6
px-6
py-4
bg-[#704E98]
text-white
rounded-2xl
">

 Добавить фото

</button>








<button

onclick="sendRecipe()"

class="
mt-6
w-full
py-5
bg-[#FFAC54]
text-white
rounded-2xl
font-bold
">

 Отправить на модерацию

</button>






</div>





<script type="module" src="create-recipe.js"></script>



</body>

</html>
