<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Purple Flavor</title>

<link rel="icon" href="assets/favicon.png?v=2">
    
<script src="https://cdn.tailwindcss.com"></script>

<link 
rel="stylesheet" 
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
>


<style>

:root {
    --primary:#704E98;
}


.dark {
    --primary:#9D91D9;
}


.card-hover{

    transition:.3s;

}


.card-hover:hover{

    transform:translateY(-8px);

}


.blob{

border-radius:60% 40% 50% 50% / 50% 60% 40% 50%;

background:
linear-gradient(
135deg,
#C9BFF4,
#9D91D9
);

}


.page-transition{

animation:fade .4s ease;

}


@keyframes fade{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:none;

}

}


</style>


</head>



<body

class="
bg-[#FFEEDA]
dark:bg-[#241B33]
text-[#3A2E52]
dark:text-[#F3EEFF]
min-h-screen
">



<header

class="
sticky
top-0
z-50
bg-white/90
dark:bg-[#241B33]/90
backdrop-blur-md
border-b
"
>


<div

class="
max-w-6xl
mx-auto
px-4
py-4
flex
items-center
justify-between
">


<div

onclick="goHome()"

class="
flex
items-center
gap-3
cursor-pointer
">

<div

class="
w-10
h-10
rounded-2xl
bg-gradient-to-br
from-[#C9BFF4]
to-[#704E98]
flex
items-center
justify-center
text-3xl
">

🍇

</div>


<h1

class="
text-2xl
font-bold
text-[#704E98]
dark:text-white
">

Purple Flavor

</h1>


</div>





<div class="flex items-center gap-3">


<button

onclick="openCreatePage()"

class="
px-5
py-3
bg-gradient-to-r
from-[#FFAC54]
to-orange-500
text-white
rounded-2xl
font-medium
">

<i class="fas fa-plus"></i>

Добавить рецепт

</button>






<button

onclick="toggleFavoritesView()"

class="
px-5
py-3
rounded-2xl
"
>

❤️

<span id="favCount">
0
</span>

</button>




<button

onclick="handleAuthClick()"

id="authBtn"

class="
px-6
py-3
bg-[#704E98]
text-white
rounded-2xl
">

<i class="fas fa-user"></i>

<span id="authBtnText">
Войти
</span>

</button>



</div>


</div>


</header>





<main

class="
max-w-6xl
mx-auto
px-4
py-8
">


<h2

id="pageTitle"

class="
text-3xl
font-bold
mb-6
">

</h2>


<div
id="recipeControls"
class="
flex
flex-col
sm:flex-row
gap-3
mb-8
">

<input
type="text"
id="searchInput"
placeholder="Поиск рецептов по названию..."
class="
flex-1
bg-white
dark:bg-[#33294a]
border
border-transparent
rounded-2xl
px-5
py-3
focus:outline-none
focus:ring-2
focus:ring-[#704E98]
"
>

<select
id="categoryFilter"
class="
bg-white
dark:bg-[#33294a]
border
border-transparent
rounded-2xl
px-5
py-3
sm:w-52
focus:outline-none
focus:ring-2
focus:ring-[#704E98]
"
>
</select>

<select
id="sortSelect"
class="
bg-white
dark:bg-[#33294a]
border
border-transparent
rounded-2xl
px-5
py-3
sm:w-52
focus:outline-none
focus:ring-2
focus:ring-[#704E98]
"
>
<option value="date-desc">Сначала новые</option>
<option value="date-asc">Сначала старые</option>
<option value="alpha">По алфавиту</option>
</select>

</div>


<div

id="mainContent"

class="
grid
grid-cols-1
sm:grid-cols-2
lg:grid-cols-3
xl:grid-cols-4
gap-6
">

</div>


</main>
<!-- AUTH MODAL -->

<div 
id="authModal"

class="
hidden
fixed
inset-0
bg-black/70
flex
items-center
justify-center
z-[100]
">


<div

class="
bg-white
dark:bg-[#33294a]
rounded-3xl
p-8
w-full
max-w-md
">


<h2 class="text-2xl font-bold mb-6 text-center">

Вход в Purple Flavor

</h2>



<input

id="usernameInput"

placeholder="Имя пользователя"

class="
w-full
px-4
py-3
rounded-2xl
border
mb-3
bg-white
dark:bg-[#241B33]
dark:text-white
placeholder:text-gray-400
focus:outline-none
focus:ring-2
focus:ring-[#704E98]
"

>




<input

id="passwordInput"

type="password"

placeholder="Пароль"

class="
w-full
px-4
py-3
rounded-2xl
border
mb-6
bg-white
dark:bg-[#241B33]
dark:text-white
placeholder:text-gray-400
focus:outline-none
focus:ring-2
focus:ring-[#704E98]
"

>




<button

onclick="loginUser()"

class="
w-full
py-4
bg-[#704E98]
text-white
rounded-2xl
mb-3
">

Войти

</button>




<button

onclick="registerUser()"

class="
w-full
py-4
border
border-[#704E98]
rounded-2xl
">

Регистрация

</button>



</div>

</div>





<!-- LOGOUT MODAL -->


<div

id="logoutModal"

class="
hidden
fixed
inset-0
bg-black/70
flex
items-center
justify-center
z-[100]
">


<div

class="
bg-white
dark:bg-[#33294a]
rounded-3xl
p-8
text-center
">


<h3 class="text-xl font-bold mb-5">

Выйти из аккаунта?

</h3>



<button

onclick="performLogout()"

class="
px-6
py-3
bg-red-600
text-white
rounded-2xl
">

Выйти

</button>


<button

onclick="closeLogoutModal()"

class="
px-6
py-3
border
rounded-2xl
ml-3
">

Отмена

</button>



</div>


</div>





<script 
type="module" 
src="./app.js">
</script>

</body>

</html>
