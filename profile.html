<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Мой профиль</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{

    background:#FFEEDA;

    color:#3A2E52;

}

.profile-card{

    background:white;

    border-radius:32px;

    box-shadow:0 10px 30px rgba(0,0,0,.08);

}

.recipe-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(270px,1fr));

    gap:24px;

}

</style>

</head>

<body>

<div class="max-w-6xl mx-auto px-4 py-8">

<div class="flex justify-between items-center mb-6">

<button

onclick="history.back()"

class="
px-5
py-3
bg-[#704E98]
text-white
rounded-2xl
">

← Назад

</button>

<button

id="logoutBtn"

onclick="performLogout()"

class="
px-5
py-3
border
border-red-300
text-red-500
rounded-2xl
">

Выйти

</button>

</div>



<div

class="
profile-card
p-8
mb-8
">

<div class="flex flex-col items-center">

<img

id="avatar"

src="https://placehold.co/180x180"

class="
w-44
h-44
rounded-full
object-cover
border-4
border-[#704E98]
"

>

<h1

id="username"

class="
text-4xl
font-bold
mt-6
"

>

<p

id="login"

class="
text-gray-500
text-lg
mt-2
">

</p>

Загрузка...

</h1>

<p

id="bio"

class="
text-gray-500
mt-3
text-center
max-w-xl
"

>

Описание отсутствует

</p>

<button

id="editProfile"

class="
mt-6
px-6
py-3
bg-[#704E98]
text-white
rounded-2xl
"

>

Редактировать профиль

</button>

<div
id="editRecipeBlock"
class="
hidden
mt-10
bg-white
rounded-3xl
p-6
shadow
max-w-2xl
mx-auto
"
>

<h3
class="
text-2xl
font-bold
mb-5
"
>
Редактирование рецепта
</h3>


<input

id="editRecipeTitle"

class="
w-full
border
rounded-xl
p-3
mb-4
"

placeholder="Название рецепта"

>


<select

id="editRecipeCategory"

class="
w-full
border
rounded-xl
p-3
mb-4
"

>

</select>


<textarea

id="editRecipeContent"

class="
w-full
border
rounded-xl
p-3
h-60
"

placeholder="Описание и рецепт"

></textarea>


<div
class="
flex
gap-4
mt-5
"
>

<button

id="saveRecipeEdit"

class="
px-6
py-3
bg-[#704E98]
text-white
rounded-2xl
"

>

Сохранить

</button>


<button

id="cancelRecipeEdit"

class="
px-6
py-3
bg-gray-200
rounded-2xl
"

>

Отмена

</button>


</div>

</div>

</div>

</div>



<h2

class="
text-3xl
font-bold
mb-6
"

>

Мои рецепты

</h2>

<div class="flex gap-3 mb-6">

<button
id="tabOwnRecipes"
onclick="switchProfileTab('own')"
class="
px-5
py-2
rounded-xl
bg-[#704E98]
text-white
"
>
Мои рецепты
</button>

<button
id="tabDraftRecipes"
onclick="switchProfileTab('draft')"
class="
px-5
py-2
rounded-xl
bg-white
text-[#3A2E52]
"
>
Черновики
</button>

</div>

<div

id="recipes"

class="recipe-grid"

>

</div>

</div>

<!-- EDIT PROFILE -->

<div

id="editModal"

class="
hidden
fixed
inset-0
bg-black/70
flex
items-center
justify-center
z-50
">

<div

class="
bg-white
rounded-3xl
p-8
w-full
max-w-lg
">

<h2

class="
text-2xl
font-bold
mb-6
">

Редактирование профиля

</h2>



<input

id="editName"

placeholder="Имя"

class="
w-full
border
rounded-2xl
px-4
py-3
mb-4
"

>



<textarea

id="editBio"

placeholder="О себе"

class="
w-full
border
rounded-2xl
px-4
py-3
h-40
mb-4
"

></textarea>



<input

id="avatarFile"

type="file"

accept="image/*"

class="mb-5"

>



<div class="flex gap-3">

<button

onclick="saveProfile()"

class="
flex-1
bg-[#704E98]
text-white
py-3
rounded-2xl
">

Сохранить

</button>



<button

onclick="closeEditModal()"

class="
flex-1
border
py-3
rounded-2xl
">

Отмена

</button>

</div>

</div>

</div>

<script
type="module"
src="profile.js"
></script>

</body>

</html>
