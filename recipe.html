<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Purple Flavor — Рецепт</title>

<link rel="icon" href="assets/favicon.png?v=2">
    
<script src="https://cdn.tailwindcss.com"></script>


<style>

body{

background:#FFEEDA;

color:#3A2E52;

}


.recipe-content{

font-size:18px;

line-height:1.8;

}



.recipe-content img{

width:48%;

margin:1%;

border-radius:20px;

display:inline-block;

cursor:pointer;

}



@media(max-width:640px){

.recipe-content img{

width:100%;

margin:10px 0;

}

}


</style>

</head>




<body>




<div class="max-w-4xl mx-auto px-4 py-8">





    <button

    onclick="history.back()"
    
    class="
    mb-6
    px-5
    py-3
    bg-[#704E98]
    text-white
    rounded-2xl
    ">
    
    ← Назад
    
    </button>







<div

class="
bg-white
rounded-3xl
p-8
shadow
">





<h1

id="title"

class="
text-4xl
font-bold
mb-4
">

</h1>





<div class="flex justify-between items-center mb-8">


<p

id="category"

class="
text-[#FFAC54]
font-bold
">

</p>





<button

id="favoriteBtn"

onclick="toggleFavorite()"

class="
text-3xl
">

♡


</button>


</div>








<div

id="content"

class="
recipe-content
">

</div>







<div

class="
mt-10
text-gray-400
"

id="author">

</div>





</div>





</div>






<script type="module" src="recipe.js"></script>

</html>
